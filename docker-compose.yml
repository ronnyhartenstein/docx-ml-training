services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      # MLX-Server läuft nativ auf dem Mac — über host.docker.internal erreichbar
      MLX_SERVER_HOST: host.docker.internal
      MLX_SERVER_PORT: 8080
    # Auf macOS ist host.docker.internal automatisch verfügbar.
    # Auf Linux ggf. extra_hosts aktivieren:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: unless-stopped
