<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPS neo Fachkonzept-Assistent</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>PPS neo</h1>
        <span class="subtitle">Fachkonzept-Assistent</span>
      </div>
      <div class="sidebar-section">
        <button id="btn-new-chat" class="btn-primary">Neuer Chat</button>
      </div>
      <div class="sidebar-section">
        <div id="status-indicator" class="status-unknown">
          <span class="status-dot"></span>
          <span id="status-text">Verbinde...</span>
        </div>
      </div>
    </aside>

    <main class="chat-area">
      <div id="messages" class="messages">
        <div class="welcome-message">
          <h2>Willkommen beim PPS neo Assistenten</h2>
          <p>Stellen Sie Fragen zu den Fachkonzepten, z.B.:</p>
          <div class="example-questions">
            <button class="example-btn" onclick="setQuestion(this.textContent)">
              Was ist das Berechtigungskonzept in Release EE20.4?
            </button>
            <button class="example-btn" onclick="setQuestion(this.textContent)">
              Wie funktioniert die Rechnungsstellung?
            </button>
            <button class="example-btn" onclick="setQuestion(this.textContent)">
              Welche Änderungen gibt es im Modul Organisation?
            </button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <textarea
            id="user-input"
            placeholder="Frage eingeben... (Enter zum Senden, Shift+Enter für neue Zeile)"
            rows="1"
            autofocus
          ></textarea>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
